<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lie Detector v3.52G</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f2f5f9;
    --surface2: #e4eaf2;
    --surface3: #d6deeb;
    --border: #b0bece;
    --border2: #7090b0;
    --accent: #009e70;
    --accent-dim: rgba(0, 158, 112, 0.10);
    --accent2: #c97a00;
    --accent2-dim: rgba(201, 122, 0, 0.10);
    --red: #c8102e;
    --red-dim: rgba(200, 16, 46, 0.08);
    --text: #000000;
    --muted: #404060;
    --muted2: #304058;
    --gold: #b07a00;
    --gold-dim: rgba(176, 122, 0, 0.10);
    --mono: 'Space Mono', monospace;
    --radius: 6px;
    --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-weight: 400;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  canvas { touch-action: none; }

  /* ── ADD-ON STYLE: ESTIMATED CHANGE BOX ── */
  .est-box {
    position: absolute;
    bottom: 12px;
    right: 48px;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    z-index: 100;
    font-family: var(--mono);
    font-size: 0.75rem; 
    font-weight: 400;
    color: #c8102e;
    border: 1px solid rgba(0,0,0,0.1);
    pointer-events: none;
    transition: background-color 0.3s ease;
  }

  /* ── SPINNER ── */
  #ov {
    display: none; position: fixed; inset: 0;
    background: rgba(255,255,255,0.96);
    z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
    backdrop-filter: blur(4px);
  }
  .spin {
    width: 36px; height: 36px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #ovTxt { color: var(--accent); font-size: 0.65rem; margin-top: 12px; letter-spacing: 0.12em; opacity: 0.8; transition: color 0.2s;}

  /* ── SETUP SCREEN ── */
  #setupScreen {
    position: fixed; inset: 0; background: var(--bg);
    z-index: 500; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem; text-align: center;
  }
  .setup-logo {
    font-size: 0.65rem; color: var(--accent);
    letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.2rem; opacity: 0.7;
  }
  .setup-title { font-size: 1.75rem; font-weight: 400; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
  .setup-sub { color: var(--muted); font-size: 0.75rem; margin-bottom: 1.4rem; letter-spacing: 0.04em; }

  .fund-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; width: 100%; max-width: 350px; margin-bottom: 0.75rem;
  }
  .fund-box {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--muted2); padding: 12px 4px; border-radius: var(--radius);
    font-size: 0.75rem; font-weight: 400;
    cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.05em;
  }
  .fund-box:hover { border-color: var(--border2); color: var(--text); }
  .fund-box.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

  .dropdown {
    background: var(--surface2); border: 1.5px solid var(--border);
    color: var(--text); padding: 11px 12px;
    width: 100%; max-width: 350px; margin-bottom: 0.75rem;
    border-radius: var(--radius); font-size: 0.75rem; font-family: var(--mono);
    transition: border-color 0.15s;
  }
  .dropdown:focus { outline: none; border-color: var(--accent); }

  .custom-inputs { display: flex; gap: 8px; width: 100%; max-width: 350px; margin-bottom: 0.75rem; }
  .c-input-box {
    flex: 1; background: var(--surface2); padding: 8px 10px;
    border-radius: var(--radius); border: 1.5px solid var(--border);
    transition: border-color 0.15s;
  }
  .c-input-box:focus-within { border-color: var(--accent); }
  .c-label { font-size: 0.6rem; color: var(--muted); display: block; margin-bottom: 3px; letter-spacing: 0.1em; }
  .c-num {
    width: 100%; background: transparent; border: none;
    font-weight: 700; font-size: 1rem; font-family: var(--mono);
    outline: none; text-align: center; color: inherit;
  }

  .setup-btns { display: flex; gap: 8px; width: 100%; max-width: 350px; margin-top: 1rem; }
  .setup-btn {
    flex: 1; font-size: 0.68rem; font-weight: 400; font-family: var(--mono);
    padding: 12px 4px; border-radius: var(--radius); cursor: pointer;
    border: 1.5px solid; text-transform: uppercase; letter-spacing: 0.08em;
    transition: all 0.15s ease; background: transparent;
  }
  .setup-btn-sim { border-color: var(--accent); color: var(--accent); }
  .setup-btn-sim:hover { background: var(--accent-dim); }
  .setup-btn-wave { border-color: var(--accent2); color: var(--accent2); }
  .setup-btn-wave:hover { background: var(--accent2-dim); }
  .setup-btn-live { border-color: var(--border2); color: var(--muted2); }
  .setup-btn-live:hover { border-color: var(--muted2); color: var(--text); }

  .app-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .logo { font-weight: 700; font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em; display: flex; align-items: center; }
  .logo span { color: var(--muted); font-weight: 400; }
  
  .fund-name-tag {
    font-size: 0.6rem; margin-left: 8px; padding-left: 8px;
    border-left: 1px solid var(--border); color: var(--text);
    font-weight: 400; letter-spacing: 0.04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
  }

  .hdr-btns { display: flex; gap: 8px; align-items: center; }
  .btn-log {
    background: transparent; color: var(--muted2); border: 1px solid var(--border2);
    padding: 5px 10px; font-size: 0.65rem; font-family: var(--mono); font-weight: 400;
    cursor: pointer; border-radius: var(--radius-sm); letter-spacing: 0.08em; transition: all 0.15s;
  }
  .btn-log:hover { color: var(--text); border-color: var(--muted2); }
  .btn-review {
    background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold);
    padding: 5px 10px; font-size: 0.65rem; font-family: var(--mono); font-weight: 400;
    cursor: pointer; border-radius: var(--radius-sm); letter-spacing: 0.08em; transition: all 0.15s;
  }
  .btn-review:hover { background: rgba(251,191,36,0.15); }

  .networth-header {
    display: flex; justify-content: space-around;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 7px 8px; flex-shrink: 0;
  }
  .nw-col { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .nw-lbl { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .nw-val { font-size: 1.25rem; font-weight: 400; white-space: nowrap; overflow: hidden; }
  .nw-divider { width: 1px; background: var(--border); align-self: stretch; }

  #alertBanner {
    display: block; height: 36px; line-height: 36px; padding: 0 12px;
    text-align: center; font-weight: 700; font-size: 0.82rem;
    text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
    visibility: hidden; border-bottom: 1px solid rgba(0,0,0,0.15);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  #alertBanner.banner-on { visibility: visible; animation: pulseAlert 1.8s ease-in-out infinite; }
  
  #liveAlertBanner, #liveChartAlertBanner {
    display: block; height: 36px; line-height: 36px; padding: 0 12px;
    text-align: center; font-weight: 700; font-size: 0.82rem;
    text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
    visibility: hidden; border-bottom: 1px solid rgba(0,0,0,0.15);
  }
  #liveAlertBanner.banner-on, #liveChartAlertBanner.banner-on { visibility: visible; animation: pulseAlert 1.8s ease-in-out infinite; }
  .alert-danger { background: var(--red); color: #fff; }
  .alert-buy { background: var(--accent); color: #021a0f; }
  .alert-profit { background: var(--accent2); color: #1a0a00; }
  @keyframes pulseAlert { 0%, 100% { opacity: 1; } 50% { opacity: 0.72; } }

  .main-sim { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .main-sim-scroll { flex-shrink: 0; overflow-y: auto; padding-bottom: 96px; }

  .chart-container {
    background: var(--bg); padding: 6px 8px; height: 52vh; min-height: 380px; 
    border-bottom: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;
  }
  .chart-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .label-sm { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .chart-nav { font-size: 0.75rem; color: var(--text); font-weight: 400; }

  .chart-split { display: flex; flex-direction: column; flex-grow: 1; position: relative; min-height: 0; }
  .chart-main-pane { flex: 2.2; position: relative; width: 100%; min-height: 0; }
  .chart-rsi-pane  { flex: 1.43; position: relative; width: 100%; min-height: 0; border-top: 1px dashed var(--border); margin-top: 4px; }
  .chart-delta-pane{ flex: 1.1; position: relative; width: 100%; min-height: 0; border-top: 1px dashed var(--border); margin-top: 4px; }
  
  .canvas-box { position: absolute; inset: 0; }
  .canvas-box-bottom { position: absolute; inset: 0; top: 18px; }
  .delta-label {
    position: absolute; top: 3px; left: 4px; font-size: 0.52rem; color: var(--muted);
    z-index: 10; letter-spacing: 0.08em; pointer-events: none; background: rgba(255,255,255, 0.8); padding: 1px 4px; border-radius: 2px;
  }

  .chart-hud {
    position: absolute; top: 4px; left: 4px; width: calc(100% - 60px); font-family: var(--mono);
    font-size: 0.55rem; font-weight: 400; color: #ffffff; z-index: 10; pointer-events: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; letter-spacing: -0.02em;
  }
  .chart-hud:not(:empty) { background: rgba(255,255,255, 0.88); padding: 2px 5px; border-radius: 2px; }

  .indicator-row { display: flex; justify-content: space-between; align-items: stretch; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .ind-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px 2px; border-right: 1px solid var(--border); }
  .ind-box:last-child { border-right: none; }
  .ind-val { font-size: 1.0rem; font-weight: 700; margin-top: 3px; padding: 2px 8px; border-radius: var(--radius-sm); transition: color 0.3s, background 0.3s; text-align: center; }
  .reg-A { color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(0,232,162,0.3); }
  .reg-B { color: var(--accent2); background: var(--accent2-dim); border: 1px solid rgba(245,158,11,0.3); }
  .reg-C { color: var(--red); background: var(--red-dim); border: 1px solid rgba(240,64,96,0.3); }

  .psy-box { padding: 4px 14px 10px 14px; background: var(--surface); flex-shrink: 0; font-size: 0.62rem; }
  .psy-logic { font-size: 0.70rem; color: var(--text); line-height: 1.6; border-left: 2px solid var(--accent); padding-left: 10px; margin-top: 6px; }

  .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px; z-index: 200; height: 88px; }
  .btn { font-family: var(--mono); font-size: 0.67rem; font-weight: 700; padding: 8px 2px; border-radius: var(--radius-sm); cursor: pointer; border: 1.5px solid transparent; text-transform: uppercase; text-align: center; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-buy { border-color: var(--accent); color: var(--accent); }
  .btn-hold { border-color: var(--border2); color: var(--muted2); }
  .btn-sell { border-color: var(--red); color: var(--red); }
  .btn-profit { border-color: var(--accent2); color: var(--accent2); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 600; flex-direction: column; }
  .modal-close { padding: 11px 14px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
  .modal-close-btn { font-size: 0.65rem; color: var(--red); cursor: pointer; }
</style>
</head>
<body>

<div id="ov" style="display:none;"><div class="spin"></div><span id="ovTxt">SYNCING...</span></div>

<div id="setupScreen">
  <div class="setup-logo">Sacred RSI Regime System</div>
  <h1 class="setup-title">Lie Detector HTTP App <span style="color:var(--muted);font-size:0.45em;font-weight:400;">v3.52G</span></h1>
  <p class="setup-sub">Train your discipline before real money does.</p>

  <div class="fund-grid" id="fundGrid">
    <div class="fund-box" onclick="selectAMC('HDFC', this)">HDFC</div>
    <div class="fund-box active" onclick="selectAMC('ICICI', this)">ICICI</div>
    <div class="fund-box" onclick="selectAMC('KOTAK', this)">KOTAK</div>
    <div class="fund-box" onclick="selectAMC('ABSL', this)">ABSL</div>
  </div>

  <select id="fundSelect" class="dropdown" onchange="saveFundSelection()"></select>

  <div class="custom-inputs">
    <div class="c-input-box">
      <span class="c-label">Profit Delta</span>
      <input type="number" id="profitDeltaIn" class="c-num" style="color: var(--accent2);" value="15" onchange="saveFundSelection()">
    </div>
    <div class="c-input-box">
      <span class="c-label">Scout Buy</span>
      <input type="number" id="buyDeltaIn" class="c-num" style="color: var(--accent);" value="-15" onchange="saveFundSelection()">
    </div>
  </div>

  <div class="setup-btns" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <button class="setup-btn setup-btn-sim"  onclick="initGame('random')">Simulator</button>
    <button class="setup-btn setup-btn-wave" onclick="initGame('wave')">Recent Simulator</button>
    <button class="setup-btn setup-btn-live" onclick="initLiveChart()">Live Cockpit</button>
    <button class="setup-btn" style="border-color:var(--gold);color:var(--gold);" onclick="initLiveAnalytics()">Live Analytics</button>
  </div>
</div>

<div id="liveChartModal" class="modal-overlay">
  <div class="modal-close">
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="modal-title" style="color:var(--accent2);">LIVE COCKPIT</span>
      <span id="liveChartFundName" class="fund-name-tag"></span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="reset-zoom" onclick="if(liveChart)liveChart.resetZoom()">RESET ZOOM</button>
      <span class="modal-close-btn" onclick="document.getElementById('liveChartModal').style.display='none';document.getElementById('setupScreen').style.display='flex'">[ X ]</span>
    </div>
  </div>

  <div id="liveChartAlertBanner"></div>

  <div class="indicator-row">
    <div class="ind-box" style="flex:1.1;"><span class="label-sm" id="liveNavDate">NAV</span><div id="liveNav" class="ind-val">--</div></div>
    <div class="ind-box" style="flex:0.8;"><span class="label-sm">Daily RSI</span><div id="liveDRsi" class="ind-val">--</div></div>
    <div class="ind-box" style="flex:0.8;"><span class="label-sm">Weekly RSI</span><div id="liveWRsi" class="ind-val">--</div></div>
    <div class="ind-box" style="flex:1.3;"><span class="label-sm">Regime</span><div id="liveRegimeBlock" class="ind-val">--</div></div>
  </div>

  <div style="flex-grow:1;padding:4px 8px 6px;display:flex;flex-direction:column;min-height:0;">
    <div class="chart-split">
      <div class="chart-main-pane">
        <div class="chart-hud" id="liveHudMainChart"></div>
        <div class="canvas-box"><canvas id="liveChartCanvas2"></canvas></div>
        
        <div id="liveEstimateBox" class="est-box" style="display: none;">
          Estimated change: <span id="estValue">--%</span>
        </div>
      </div>
      <div class="chart-rsi-pane">
        <div class="canvas-box-bottom"><canvas id="liveRsiCanvas2"></canvas></div>
      </div>
      <div class="chart-delta-pane">
        <div class="canvas-box-bottom"><canvas id="liveDeltaCanvas2"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script>
// (All logic from v315 continues here...)
const amcFunds = {
  'HDFC': [{ name: 'HDFC Flexi Cap', code: '118989' }, { name: 'HDFC Gold ETF', code: '119132' }],
  'ICICI': [{ name: 'ICICI Flexicap', code: '119062' }, { name: 'ICICI Nifty IT', code: '150468' }],
  'KOTAK': [{ name: 'KOTAK Flexicap', code: '120166' }],
  'ABSL': [{ name: 'ABSL Flexi Cap', code: '120517' }]
};

// LDv352G ADD-ON: BENCHMARK MAPPING
const benchmarkMap = {
  // NPS Schemes
  'SM007001': '^CNX200', 'SM007002': '^NIFTY_CORP_BOND',
  // ETF Tickers
  '119132': 'GOLDBEES.NS', '150737': 'SILVERBEES.NS',
  // Default Benchmark
  'DEFAULT': '^NSEI'
};

async function updateLiveEstimate() {
  const estBox = document.getElementById('liveEstimateBox');
  const estValue = document.getElementById('estValue');
  const selectedCode = document.getElementById('fundSelect').value;
  
  if (document.getElementById('liveChartModal').style.display === 'flex') {
    estBox.style.display = 'block';
    const ticker = benchmarkMap[selectedCode] || benchmarkMap['DEFAULT'];

    try {
      const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=15m&range=1d`);
      const data = await response.json();
      const meta = data.chart.result[0].meta;
      const change = ((meta.regularMarketPrice - meta.previousClose) / meta.previousClose) * 100;
      
      estValue.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
      if (change > 0.05) estBox.style.backgroundColor = '#dcfce7'; 
      else if (change < -0.05) estBox.style.backgroundColor = '#fee2e2';
      else estBox.style.backgroundColor = '#ffedd5';
    } catch (e) { estValue.textContent = "Updating..."; }
  }
}

function selectAMC(amc, el) {
  document.querySelectorAll('.fund-box').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const sel = document.getElementById('fundSelect');
  sel.innerHTML = '';
  amcFunds[amc].forEach(f => {
    const o = document.createElement('option');
    o.value = f.code; o.textContent = f.name; sel.appendChild(o);
  });
}

// Initial setup logic...
window.onload = () => { selectAMC('ICICI', document.querySelectorAll('.fund-box')[1]); };
setInterval(updateLiveEstimate, 900000); // 15 Min Refresh
</script>
</body>
</html>
