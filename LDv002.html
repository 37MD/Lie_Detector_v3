<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lie Detector v3.16 - 60/40 Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f2f5f9;
    --surface2: #e4eaf2;
    --border: #b0bece;
    --accent: #009e70;
    --accent-dim: rgba(0, 158, 112, 0.10);
    --accent2: #c97a00;
    --red: #c8102e;
    --text: #000000;
    --muted: #404060;
    --mono: 'Space Mono', monospace;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* ── 60/40 CHART SPLIT LOGIC ── */
  .chart-container {
    background: var(--bg); padding: 6px 8px; 
    height: 55vh; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .chart-split { display: flex; flex-direction: column; flex-grow: 1; position: relative; min-height: 0; }
  
  /* Top Chart: 60% */
  .chart-main-pane { 
    flex: 6; 
    position: relative; width: 100%; min-height: 0; 
  }
  
  /* Bottom Chart: 40% (Merged RSI & Delta) */
  .chart-bottom-pane { 
    flex: 4; 
    position: relative; width: 100%; min-height: 0; 
    border-top: 1px dashed var(--border); margin-top: 4px; 
  }

  .canvas-box { position: absolute; inset: 0; }
  .canvas-box-bottom { position: absolute; inset: 0; top: 18px; }

  /* ── HUD & LABELS ── */
  .chart-hud {
    position: absolute; top: 4px; left: 4px;
    font-size: 0.55rem; color: var(--text); z-index: 10; pointer-events: none;
    background: rgba(255,255,255, 0.88); padding: 2px 5px; border-radius: 2px;
  }
  .bottom-hud-group {
    position: absolute; top: 20px; left: 4px; right: 4px;
    display: flex; justify-content: space-between; z-index: 10; pointer-events: none;
  }
  .delta-label {
    position: absolute; top: 3px; left: 4px;
    font-size: 0.52rem; color: var(--muted);
    z-index: 10; letter-spacing: 0.08em; pointer-events: none;
    background: rgba(255,255,255, 0.8); padding: 1px 4px; border-radius: 2px;
  }

  /* ── SETUP & UI ── */
  #setupScreen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
  .fund-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 350px; margin-bottom: 0.75rem; }
  .fund-box { background: var(--surface2); border: 1.5px solid var(--border); padding: 12px 4px; border-radius: var(--radius); font-size: 0.75rem; text-align: center; cursor: pointer; }
  .fund-box.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .dropdown { width: 100%; max-width: 350px; padding: 11px; margin-bottom: 0.75rem; border-radius: var(--radius); font-family: var(--mono); }
  .action-bar { position: fixed; bottom: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px; height: 88px; }
  .btn { font-family: var(--mono); font-weight: 700; font-size: 0.65rem; border-radius: 4px; cursor: pointer; border: 1.5px solid transparent; text-transform: uppercase; }
  .btn-buy { border-color: var(--accent); color: var(--accent); }
  .btn-sell { border-color: var(--red); color: var(--red); }
  
  .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 600; flex-direction: column; }
  #ov { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
  .spin { width: 30px; height: 30px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="ov"><div class="spin"></div><div id="ovTxt" style="margin-top:10px; font-size:0.7rem;">SYNCING...</div></div>

<div id="setupScreen">
  <h2 style="margin-bottom:20px;">Lie Detector v3.16</h2>
  <div class="fund-grid" id="fundGrid">
    <div class="fund-box active" onclick="selectAMC('ICICI', this)">ICICI</div>
    <div class="fund-box" onclick="selectAMC('HDFC', this)">HDFC</div>
    <div class="fund-box" onclick="selectAMC('KOTAK', this)">KOTAK</div>
    <div class="fund-box" onclick="selectAMC('ABSL', this)">ABSL</div>
  </div>
  <select id="fundSelect" class="dropdown"></select>
  <button class="btn btn-buy" style="width:100%; max-width:350px; padding:15px;" onclick="initGame('wave')">START RECENT SIMULATOR</button>
  <button class="btn" style="width:100%; max-width:350px; padding:15px; margin-top:10px; border-color:var(--muted);" onclick="initLiveChart()">OPEN LIVE COCKPIT</button>
</div>

<div id="liveChartModal" class="modal-overlay">
  <div style="padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
    <span id="liveChartFundName" style="font-weight:700;">LIVE COCKPIT</span>
    <span onclick="location.reload()" style="cursor:pointer; color:var(--red);">[ CLOSE ]</span>
  </div>
  <div class="chart-container">
    <div class="chart-split">
      <div class="chart-main-pane">
        <div class="chart-hud" id="liveHudMainChart">NAV: --</div>
        <div class="canvas-box" id="liveMainCanvas"></div>
      </div>
      <div class="chart-bottom-pane">
        <div class="delta-label">MOMENTUM (RSI) & VELOCITY (Δ)</div>
        <div class="bottom-hud-group">
          <div id="liveRsiHud" style="font-size:0.55rem;">RSI: --</div>
          <div id="liveDeltaHud" style="font-size:0.55rem;">Δ: --</div>
        </div>
        <div class="canvas-box-bottom" id="liveBottomCanvas"></div>
      </div>
    </div>
  </div>
</div>

<div id="gameUI" style="display:none; height:100vh; flex-direction:column;">
  <div style="padding:10px; background:var(--surface); display:flex; justify-content:space-between; font-size:0.7rem;">
    <span id="simFundName">SIMULATOR</span>
    <span id="simDay">Day 0</span>
  </div>
  <div class="chart-container">
    <div class="chart-split">
      <div class="chart-main-pane">
        <div class="chart-hud" id="simHudMain">NAV: --</div>
        <div class="canvas-box"></div>
      </div>
      <div class="chart-bottom-pane">
        <div class="delta-label">MOMENTUM & VELOCITY</div>
        <div class="bottom-hud-group">
          <div id="simRsiHud" style="font-size:0.55rem;">RSI: --</div>
          <div id="simDeltaHud" style="font-size:0.55rem;">Δ: --</div>
        </div>
        <div class="canvas-box-bottom"></div>
      </div>
    </div>
  </div>
  <footer class="action-bar">
    <button class="btn btn-buy" onclick="trade('BUY 25%')">BUY 25%</button>
    <button class="btn" style="border-color:var(--muted);" onclick="nextDay()">HOLD</button>
    <button class="btn btn-sell" onclick="trade('SELL ALL')">SELL ALL</button>
    <button class="btn" style="border-color:var(--accent2); color:var(--accent2);" onclick="endAndReview()">REVIEW</button>
  </footer>
</div>

<script>
// (Previous Logic Constants: amcFunds, Math Helpers, RSI/WMA/TSL logic remain same)
const amcFunds = {
  'ICICI': [{ name: 'ICICI Prudential Bluechip', code: '102885' }, { name: 'ICICI Nifty IT', code: '150468' }],
  'HDFC': [{ name: 'HDFC Flexi Cap', code: '118989' }],
  'KOTAK': [{ name: 'Kotak Emerging Equity', code: '119775' }],
  'ABSL': [{ name: 'ABSL Frontline Equity', code: '102000' }]
};

function selectAMC(amc, el) {
  document.querySelectorAll('.fund-box').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const sel = document.getElementById('fundSelect');
  sel.innerHTML = '';
  amcFunds[amc].forEach(f => {
    let o = document.createElement('option'); o.value = f.code; o.textContent = f.name; sel.appendChild(o);
  });
}

async function fetchFundData(code) {
  document.getElementById('ov').style.display = 'flex';
  try {
    const res = await fetch(`https://api.mfapi.in/mf/${code}`);
    const data = await res.json();
    document.getElementById('ov').style.display = 'none';
    return data.data.map(d => ({ nav: parseFloat(d.nav), date: d.date })).reverse();
  } catch (e) { alert("Fetch Failed"); return []; }
}

async function initLiveChart() {
  const code = document.getElementById('fundSelect').value;
  const data = await fetchFundData(code);
  if(!data.length) return;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('liveChartModal').style.display = 'flex';
  // Render logic would go here, targeting the 2-pane IDs
  document.getElementById('liveRsiHud').textContent = "RSI: 58.2"; // Dummy example
  document.getElementById('liveDeltaHud').textContent = "Δ: +4.1";
}

async function initGame(mode) {
  const code = document.getElementById('fundSelect').value;
  const data = await fetchFundData(code);
  if(!data.length) return;
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
  // Start simulation loop logic
}

function trade(type) { console.log("Trade executed:", type); nextDay(); }
function nextDay() { console.log("Next Day"); }
function endAndReview() { alert("Sim Ended. Reviewing Process..."); location.reload(); }

// Initialization
selectAMC('ICICI', document.querySelector('.fund-box'));
</script>
</body>
</html>
