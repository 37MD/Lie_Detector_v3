<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lie Detector v3.16 - Pure Data Engine (Two-Chart Layout)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff; --surface: #f2f5f9; --surface2: #e4eaf2; --surface3: #d6deeb;
    --border: #b0bece; --border2: #7090b0; --accent: #009e70; --accent-dim: rgba(0, 158, 112, 0.10);
    --accent2: #c97a00; --accent2-dim: rgba(201, 122, 0, 0.10); --red: #c8102e; --red-dim: rgba(200, 16, 46, 0.08);
    --text: #000000; --muted: #404060; --muted2: #304058; --gold: #b07a00; --gold-dim: rgba(176, 122, 0, 0.10);
    --mono: 'Space Mono', monospace; --radius: 6px; --radius-sm: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── SPINNER ── */
  #ov { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(4px); }
  .spin { width: 36px; height: 36px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #ovTxt { color: var(--accent); font-size: 0.65rem; margin-top: 12px; letter-spacing: 0.12em; opacity: 0.8; }

  /* ── SETUP SCREEN ── */
  #setupScreen { position: fixed; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; text-align: center; }
  .setup-logo { font-size: 0.65rem; color: var(--accent); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.2rem; }
  .setup-title { font-size: 1.75rem; margin-bottom: 0.3rem; }
  .fund-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 350px; margin-bottom: 0.75rem; }
  .fund-box { background: var(--surface2); border: 1.5px solid var(--border); color: var(--muted2); padding: 12px 4px; border-radius: var(--radius); font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .fund-box.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .dropdown { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); padding: 11px 12px; width: 100%; max-width: 350px; margin-bottom: 0.75rem; border-radius: var(--radius); font-size: 0.75rem; font-family: var(--mono); }
  .custom-inputs { display: flex; gap: 8px; width: 100%; max-width: 350px; margin-bottom: 0.75rem; }
  .c-input-box { flex: 1; background: var(--surface2); padding: 8px 10px; border-radius: var(--radius); border: 1.5px solid var(--border); }
  .c-label { font-size: 0.6rem; color: var(--muted); display: block; margin-bottom: 3px; letter-spacing: 0.1em; }
  .c-num { width: 100%; background: transparent; border: none; font-weight: 700; font-size: 1rem; font-family: var(--mono); outline: none; text-align: center; }
  .setup-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; max-width: 350px; margin-top: 1rem; }
  .setup-btn { font-size: 0.68rem; font-family: var(--mono); padding: 12px 4px; border-radius: var(--radius); cursor: pointer; border: 1.5px solid; text-transform: uppercase; letter-spacing: 0.08em; background: transparent; transition: 0.15s; }
  .setup-btn-sim { border-color: var(--accent); color: var(--accent); }
  .setup-btn-live { border-color: var(--border2); color: var(--muted2); }

  /* ── GAME UI ── */
  .app-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .logo { font-weight: 700; font-size: 0.75rem; color: var(--accent); letter-spacing: 0.12em; }
  .fund-name-tag { font-size: 0.6rem; margin-left: 8px; padding-left: 8px; border-left: 1px solid var(--border); color: var(--text); }
  .btn-review { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; font-size: 0.65rem; font-family: var(--mono); cursor: pointer; border-radius: var(--radius-sm); }
  .networth-header { display: flex; justify-content: space-around; background: var(--surface); border-bottom: 1px solid var(--border); padding: 7px 8px; }
  .nw-col { display: flex; flex-direction: column; align-items: center; }
  .nw-lbl { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; }
  .nw-val { font-size: 1.25rem; }
  #alertBanner, #liveAlertBanner { display: block; height: 36px; line-height: 36px; text-align: center; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; visibility: hidden; }
  .banner-on { visibility: visible !important; animation: pulseAlert 1.8s infinite; }
  @keyframes pulseAlert { 0%, 100% { opacity: 1; } 50% { opacity: 0.72; } }

  /* ── TWO CHART LAYOUT (60% / 40%) ── */
  .main-sim { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chart-container { height: 55vh; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); background: var(--bg); padding: 4px; }
  .chart-split { display: flex; flex-direction: column; flex-grow: 1; }
  .chart-main-pane { flex: 0.60; position: relative; border-bottom: 1px dashed var(--border); }
  .chart-osc-pane  { flex: 0.40; position: relative; }
  .chart-hud { position: absolute; top: 4px; left: 4px; font-size: 0.55rem; z-index: 10; background: rgba(255,255,255,0.8); padding: 2px 4px; pointer-events: none; }

  /* ── INDICATORS ── */
  .indicator-row { display: flex; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); }
  .ind-box { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 4px; border-right: 1px solid var(--border); }
  .ind-val { font-size: 1.0rem; font-weight: 700; margin-top: 2px; border-radius: 4px; padding: 2px 8px; }
  .reg-A { color: var(--accent); background: var(--accent-dim); } .reg-B { color: var(--accent2); background: var(--accent2-dim); } .reg-C { color: var(--red); background: var(--red-dim); }

  .action-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--surface); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px; height: 88px; }
  .btn { font-family: var(--mono); font-size: 0.67rem; font-weight: 700; border-radius: 4px; cursor: pointer; border: 1.5px solid transparent; text-transform: uppercase; background: transparent; }
  .btn-buy { border-color: var(--accent); color: var(--accent); } .btn-sell { border-color: var(--red); color: var(--red); }
  .modal-overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 600; flex-direction: column; }
</style>
</head>
<body>

<div id="ov" style="display:none;"><div class="spin"></div><span id="ovTxt">FETCHING...</span></div>

<div id="setupScreen">
  <div class="setup-logo">Sacred RSI Regime System</div>
  <h1 class="setup-title">Lie Detector v3.16</h1>
  <div class="fund-grid" id="fundGrid">
    <div class="fund-box" onclick="selectAMC('HDFC', this)">HDFC</div>
    <div class="fund-box active" onclick="selectAMC('ICICI', this)">ICICI</div>
    <div class="fund-box" onclick="selectAMC('KOTAK', this)">KOTAK</div>
    <div class="fund-box" onclick="selectAMC('ABSL', this)">ABSL</div>
  </div>
  <select id="fundSelect" class="dropdown" onchange="saveFundSelection()"></select>
  <div class="custom-inputs">
    <div class="c-input-box"><span class="c-label">Profit Delta</span><input type="number" id="profitDeltaIn" class="c-num" style="color:var(--accent2);" value="15"></div>
    <div class="c-input-box"><span class="c-label">Scout Buy</span><input type="number" id="buyDeltaIn" class="c-num" style="color:var(--accent);" value="-15"></div>
  </div>
  <div class="setup-btns">
    <button class="setup-btn setup-btn-sim" onclick="initGame('random')">Simulator</button>
    <button class="setup-btn setup-btn-live" onclick="initLive()">Live Analytics</button>
  </div>
</div>

<div id="gameUI" style="display:none; height:100vh; flex-direction:column;">
  <header class="app-header">
    <div class="logo">LIE DETECTOR <span id="simFundName" class="fund-name-tag"></span></div>
    <button class="btn-review" onclick="endAndReview()">END & REVIEW</button>
  </header>
  <div class="networth-header">
    <div class="nw-col"><span class="nw-lbl">Net Worth</span><span class="nw-val" id="nwVal" style="color:var(--accent);">₹1,00,000</span></div>
    <div class="nw-col"><span class="nw-lbl">Max DD</span><span class="nw-val" id="ddVal" style="color:var(--red);">0.0%</span></div>
    <div class="nw-col"><span class="nw-lbl">Cash</span><span class="nw-val" id="cashVal">₹1,00,000</span></div>
  </div>
  <div id="alertBanner"></div>
  <main class="main-sim">
    <div class="chart-container">
      <div class="chart-split">
        <div class="chart-main-pane">
          <div class="chart-hud" id="simHudPrice"></div>
          <div class="canvas-box"></div>
        </div>
        <div class="chart-osc-pane">
          <div class="chart-hud" id="simHudOsc"></div>
          <div class="canvas-box"></div>
        </div>
      </div>
    </div>
    <div class="indicator-row">
      <div class="ind-box"><span class="nw-lbl">Daily RSI</span><div id="dRsi" class="ind-val">--</div></div>
      <div class="ind-box"><span class="nw-lbl">Weekly RSI</span><div id="wRsi" class="ind-val">--</div></div>
      <div class="ind-box"><span class="nw-lbl">Regime</span><div id="regimeBlock" class="ind-val">--</div></div>
    </div>
  </main>
  <footer class="action-bar">
    <button class="btn btn-buy" onclick="trade('BUY10')">BUY 10%</button>
    <button class="btn" style="border-color:var(--border2);" onclick="nextDay()">HOLD</button>
    <button class="btn btn-buy" onclick="trade('BUY50')">BUY 50%</button>
    <button class="btn btn-sell" onclick="trade('SELLALL')">SELL ALL</button>
  </footer>
</div>

<script>
// AMCs and Funds from v315
const amcFunds = {
  'HDFC': [
    { name: 'HDFC Flexi Cap - Growth', code: '118989' },
    { name: 'HDFC Balanced Advantage - Growth', code: '118968' },
    { name: 'HDFC Gold ETF FoF - Direct', code: '119132' },
    { name: 'HDFC Nifty100 Quality 30 - Direct', code: '153264' }
  ],
  'ICICI': [
    { name: 'ICICI Flexicap - Growth', code: '119062' },
    { name: 'ICICI Balanced Advantage - Growth', code: '120377' },
    { name: 'ICICI Nifty Bank Index - Direct', code: '149858' },
    { name: 'ICICI Nifty Pharma Index - Direct', code: '150930' }
  ],
  'KOTAK': [
    { name: 'KOTAK Flexicap - Growth', code: '120166' },
    { name: 'Kotak Nifty SmallCap 250 - Direct', code: '153223' },
    { name: 'Kotak Gold Fund - Direct', code: '119781' },
    { name: 'Kotak Nifty 200 Momentum 30 - Direct', code: '151781' }
  ],
  'ABSL': [
    { name: 'ABSL Flexi Cap - Growth', code: '120517' },
    { name: 'ABSL Nifty Midcap 150 - Direct', code: '148807' },
    { name: 'ABSL BSE 500 Momentum 50 - Direct', code: '153736' },
    { name: 'ABSL Nifty India Defence - Direct', code: '152798' }
  ]
};

// ── ENGINE STATE ──
let fullHistory = [], currentIdx = 0, simStartIdx = 0;
let cash = 100000, tranches = [], tradeLog = [];
let simDailyRsiCache = [], simWeeklyRsiCache = [];

function selectAMC(amc, el) {
  document.querySelectorAll('.fund-box').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const sel = document.getElementById('fundSelect'); sel.innerHTML = '';
  amcFunds[amc].forEach(f => {
    const o = document.createElement('option'); o.value = f.code; o.textContent = f.name; sel.appendChild(o);
  });
}

// ── API ENGINE ──
async function fetchFundData() {
  const code = document.getElementById('fundSelect').value;
  const ov = document.getElementById('ov'); ov.style.display = 'flex';
  const url = code.startsWith('SM') ? `https://npsnav.in/api/historical/${code}` : `https://api.mfapi.in/mf/${code}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    ov.style.display = 'none';
    return data.data.map(d => ({ nav: parseFloat(d.nav), date: d.date })).reverse();
  } catch (e) { ov.style.display = 'none'; return []; }
}

// ── SIMULATION LOOP ──
async function initGame(mode) {
  fullHistory = await fetchFundData();
  if (!fullHistory.length) return;
  
  simStartIdx = Math.floor(Math.random() * (fullHistory.length - 400)) + 100;
  currentIdx = simStartIdx;
  
  // Pre-calculate RSI Caches for performance
  simDailyRsiCache = buildDailyRsiCache(fullHistory.map(h => h.nav));
  simWeeklyRsiCache = buildWeeklyRsiCache(fullHistory.map(h => h.nav));
  
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('gameUI').style.display = 'flex';
  updateDisplay();
}

function updateDisplay() {
  const currentNav = fullHistory[currentIdx].nav;
  const dRsi = simDailyRsiCache[currentIdx];
  const wRsi = simWeeklyRsiCache[currentIdx];
  const regime = wRsi >= 50 ? 'A' : (wRsi >= 40 ? 'B' : 'C');

  // Modular Bridge: Hand data to Add-Ons
  if (window.syncChartsWithEngine) {
    window.syncChartsWithEngine(fullHistory, currentIdx, simDailyRsiCache, simWeeklyRsiCache);
  }

  // Update Text DOM
  document.getElementById('simFundName').textContent = document.getElementById('fundSelect').selectedOptions[0].text;
  document.getElementById('dRsi').textContent = Math.round(dRsi);
  document.getElementById('wRsi').textContent = Math.round(wRsi);
  const rb = document.getElementById('regimeBlock');
  rb.textContent = 'Regime ' + regime;
  rb.className = 'ind-val ' + (regime === 'A' ? 'reg-A' : (regime === 'B' ? 'reg-B' : 'reg-C'));
}

function nextDay() {
  if (currentIdx < fullHistory.length - 1) {
    currentIdx++;
    updateDisplay();
  }
}

// (Helper functions calculateRSI, buildDailyRsiCache, etc. to be pasted here from Phase 1)
</script>
</body>
</html>
